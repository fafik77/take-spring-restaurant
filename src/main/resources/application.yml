spring:
    application:
        name: demo

    datasource:
        url: jdbc:postgresql://localhost:${DB_PORT_EXTERNAL}/${DB_NAME}
        username: ${DB_USER}
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver

    sql:
        init:
            # Changed from 'always' to 'never' since database is seeded on creation
            mode: never

    jpa:
        defer-datasource-initialization: true
        hibernate:
            # Changed from 'update' to 'validate' to confirm the schema matches the entities
            # without making changes
            ddl-auto: validate